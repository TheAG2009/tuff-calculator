<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Tap & Vibe · Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Fullscreen Toggle Button -->
        <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>
        
        <!-- Phone Frame (optional, can be removed) -->
        <div class="phone-frame">
            <div class="status-bar">
                <span>9:41</span>
                <span>📶 🔋</span>
            </div>
            
            <!-- Quote Card (Only quotes, no answers) -->
            <div class="quote-card" id="quoteCard">
                <div class="quote-icon" id="quoteIcon">💪</div>
                <div class="quote-text-wrapper">
                    <div class="quote-label" id="quoteLabel">MOTIVATION</div>
                    <div class="quote-text" id="quoteText">The harder you work, the luckier you get. Keep going!</div>
                </div>
            </div>
            
            <!-- Calculator Display -->
            <div class="calc-display">
                <input type="text" id="display" readonly value="0" inputmode="none">
            </div>
            
            <!-- Button Grid (iOS style) -->
            <div class="buttons-grid">
                <button class="btn func" data-action="clear">AC</button>
                <button class="btn func" data-action="toggleSign">+/−</button>
                <button class="btn func" data-action="percent">%</button>
                <button class="btn operator" data-op="÷">÷</button>
                
                <button class="btn num" data-num="7">7</button>
                <button class="btn num" data-num="8">8</button>
                <button class="btn num" data-num="9">9</button>
                <button class="btn operator" data-op="×">×</button>
                
                <button class="btn num" data-num="4">4</button>
                <button class="btn num" data-num="5">5</button>
                <button class="btn num" data-num="6">6</button>
                <button class="btn operator" data-op="-">−</button>
                
                <button class="btn num" data-num="1">1</button>
                <button class="btn num" data-num="2">2</button>
                <button class="btn num" data-num="3">3</button>
                <button class="btn operator" data-op="+">+</button>
                
                <button class="btn num zero" data-num="0">0</button>
                <button class="btn num" data-num=".">.</button>
                <button class="btn equal" data-action="equals">=</button>
            </div>
            
            <div class="home-bar"></div>
        </div>
    </div>
    
    <script src="quotes.js"></script>
    <script src="script.js"></script>
</body>
</html>
