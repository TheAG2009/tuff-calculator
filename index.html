<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VibeCalc · Quote Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: -apple-system, 'SF Pro Text', 'Segoe UI', system-ui, Helvetica, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .app {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            padding: 12px 16px 20px 16px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px 0;
        }

        .real-time {
            font-size: 18px;
            font-weight: 590;
            color: #fff;
            background: rgba(255,255,255,0.08);
            padding: 8px 16px;
            border-radius: 32px;
        }

        .info-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #ff9f0a;
            font-size: 22px;
            font-weight: 600;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
            transition: 0.1s ease;
        }

        .info-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.94);
        }

        /* Display Container */
        .display-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .calc-display {
            width: 100%;
            text-align: center;
            padding: 20px 0;
        }

        #display {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 28px;
            font-weight: 500;
            font-family: inherit;
            text-align: center;
            padding: 16px;
            outline: none;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: normal;
            min-height: 100px;
        }

        /* Button Grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            border: none;
            border-radius: 60px;
            padding: 22px 0;
            font-size: 36px;
            font-weight: 400;
            font-family: inherit;
            transition: 0.05s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2c2c2e;
            color: white;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.94);
            opacity: 0.7;
        }

        .operator {
            background: #ff9f0a;
            font-size: 42px;
            font-weight: 500;
        }

        .func {
            background: #50505c;
            font-size: 30px;
        }

        .equal {
            background: #ff9f0a;
            font-size: 36px;
        }

        .zero {
            grid-column: span 2;
            justify-content: flex-start;
            padding-left: 38px;
        }

        .home-indicator {
            width: 140px;
            height: 5px;
            background: #3a3a3e;
            border-radius: 100px;
            margin: 20px auto 8px auto;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1c1c1e;
            border-radius: 32px;
            width: 88%;
            max-width: 340px;
            overflow: hidden;
            animation: modalSlide 0.25s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 12px 20px;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .modal-header h3 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ff9f0a;
            font-size: 28px;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
        }

        .rule-op {
            background: #ff9f0a;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 600;
            color: #000;
        }

        .rule-desc {
            color: #e5e5e5;
            font-size: 16px;
            flex: 1;
        }

        .rule-separator {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 16px 0;
        }

        .rule-tip {
            background: rgba(255,149,0,0.15);
            padding: 14px;
            border-radius: 18px;
            color: #ffcc80;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .display-pop {
            animation: textPop 0.28s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes textPop {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .app { padding: 8px 16px; }
            .btn { padding: 12px 0; font-size: 28px; }
            #display { font-size: 22px; min-height: 60px; }
            .display-container { margin-bottom: 8px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="real-time" id="realTime">--:--</div>
            <button class="info-btn" id="infoBtn">ⓘ</button>
        </div>
        
        <div class="display-container">
            <div class="calc-display">
                <input type="text" id="display" readonly value="0" inputmode="none">
            </div>
        </div>
        
        <div class="buttons-grid">
            <button class="btn func" data-action="clear">AC</button>
            <button class="btn func" data-action="toggleSign">+/−</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn operator" data-op="÷">÷</button>
            
            <button class="btn num" data-num="7">7</button>
            <button class="btn num" data-num="8">8</button>
            <button class="btn num" data-num="9">9</button>
            <button class="btn operator" data-op="×">×</button>
            
            <button class="btn num" data-num="4">4</button>
            <button class="btn num" data-num="5">5</button>
            <button class="btn num" data-num="6">6</button>
            <button class="btn operator" data-op="-">−</button>
            
            <button class="btn num" data-num="1">1</button>
            <button class="btn num" data-num="2">2</button>
            <button class="btn num" data-num="3">3</button>
            <button class="btn operator" data-op="+">+</button>
            
            <button class="btn num zero" data-num="0">0</button>
            <button class="btn num" data-num=".">.</button>
            <button class="btn equal" data-action="equals">=</button>
        </div>
        
        <div class="home-indicator"></div>
    </div>
    
    <div class="modal" id="guidelineModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📖 How It Works</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="rule-item">
                    <span class="rule-op">+</span>
                    <span class="rule-desc">→ Motivational Quote</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">-</span>
                    <span class="rule-desc">→ Pick-up Line</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">÷</span>
                    <span class="rule-desc">→ Funny Joke</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">×</span>
                    <span class="rule-desc">→ Fun Task</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">%</span>
                    <span class="rule-desc">→ Deep Question</span>
                </div>
                <div class="rule-separator"></div>
                <div class="rule-tip">
                    🎯 Type any equation (like 2+2) and press <strong>=</strong><br>
                    The display shows a QUOTE instead of the number!
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== QUOTES DATABASE (ALL IN ONE FILE) ==========
        
        // ➕ ADDITION (+) → MOTIVATIONAL QUOTES
        const motivationQuotes = [
            "✨ The harder you work, the luckier you get. Keep going!",
            "💪 You don't have to be perfect to be amazing.",
            "🚀 Small steps every day lead to big results.",
            "🌟 Your only limit is your mind.",
            "🔥 Every expert was once a beginner.",
            "💯 Don't stop when you're tired. Stop when you're done!",
            "⚡ Dream it. Add action. Achieve it.",
            "🎯 Your potential is infinite.",
            "🌈 Believe in yourself and you're halfway there!",
            "🏆 Great things never come from comfort zones.",
            "💎 You are capable of amazing things.",
            "✨ Progress over perfection.",
            "⭐ Today's you is tomorrow's inspiration.",
            "💫 The secret of getting ahead is getting started.",
            "🌟 Success is the sum of small efforts repeated daily."
        ];

        // ➖ SUBTRACTION (-) → PICK-UP LINES
        const pickupQuotes = [
            "💕 Are you a minus sign? You take my breath away.",
            "💖 You + Me = Perfect Equation.",
            "✨ Are you a calculator? You add value to my life.",
            "⭐ You must be 90° because you're looking right!",
            "💗 Are you a square root? You've got me rooting for you.",
            "🌟 You're cute as an angle.",
            "💞 If you were a number, you'd be 10 out of 10.",
            "❤️ You subtract my stress and multiply my happiness.",
            "💫 Every minus without you feels like negative joy.",
            "😘 Do you have a name? Or can I call you mine?"
        ];

        // ➗ DIVISION (÷) → FUNNY JOKES
        const jokeQuotes = [
            "😂 Why was the math book sad? It had too many problems.",
            "🤣 What do you call a number that can't keep still? A roamin' numeral!",
            "😆 Why did the student eat his homework? The teacher said it was a piece of cake!",
            "🤪 What's a math teacher's favorite dessert? Pi! 🥧",
            "😅 Why is 6 afraid of 7? Because 7 ate 9!",
            "😂 Parallel lines have so much in common... it's a shame they'll never meet.",
            "🤣 What did the zero say to the eight? Nice belt!",
            "😆 Why don't scientists trust atoms? Because they make up everything.",
            "🤪 What do you get when you cross a snowman and a vampire? Frostbite!",
            "😂 Why did the equal sign break up? It felt unequal in the relationship."
        ];

        // ✖️ MULTIPLICATION (×) → TASKS
        const taskQuotes = [
            "🏋️ Do 10 jumping jacks RIGHT NOW!",
            "🧘 Take 5 deep breaths. In... and out...",
            "💪 Do 15 push-ups! No excuses!",
            "🏃 Stand up and stretch for 10 seconds!",
            "✍️ Write down one thing you're grateful for!",
            "💧 Drink a glass of water - stay hydrated!",
            "🧠 Close your eyes and count to 20 slowly!",
            "🎵 Hum your favorite song for 10 seconds!",
            "😊 Smile at yourself in the mirror!",
            "🙏 Say one nice thing about yourself right now!"
        ];

        // ❓ PERCENTAGE (%) → DEEP QUESTIONS
        const questionQuotes = [
            "🤔 If you're 10% smarter today than yesterday, what did you learn?",
            "🧐 What's one belief you held that turned out to be wrong?",
            "🤯 If you could only keep 20% of your memories, which would you choose?",
            "😤 What's 100% of something you've been putting off?",
            "🤨 If success was 99% failure, would you still try?",
            "😏 What's the one thing you'd change about today if you could?",
            "🧠 What percentage of your potential are you actually using?",
            "🤔 Be honest: what's something you've been avoiding?",
            "🤯 If life gave you 50% off coupon for anything, what would you buy?"
        ];

        // Track last used quotes to avoid repeats
        let lastQuoteMap = {
            '+': null,
            '-': null,
            '÷': null,
            '×': null,
            '%': null
        };

        function getRandomQuoteFromArray(arr, opKey) {
            if (!arr || arr.length === 0) return "✨ Keep going! ✨";
            if (arr.length === 1) return arr[0];
            
            let randomIndex = Math.floor(Math.random() * arr.length);
            let candidate = arr[randomIndex];
            
            while (candidate === lastQuoteMap[opKey] && arr.length > 1) {
                randomIndex = Math.floor(Math.random() * arr.length);
                candidate = arr[randomIndex];
            }
            
            lastQuoteMap[opKey] = candidate;
            return candidate;
        }

        function getQuoteByOperation(operation) {
            switch(operation) {
                case '+':
                    return getRandomQuoteFromArray(motivationQuotes, '+');
                case '-':
                    return getRandomQuoteFromArray(pickupQuotes, '-');
                case '÷':
                    return getRandomQuoteFromArray(jokeQuotes, '÷');
                case '×':
                    return getRandomQuoteFromArray(taskQuotes, '×');
                case '%':
                    return getRandomQuoteFromArray(questionQuotes, '%');
                default:
                    return getRandomQuoteFromArray(motivationQuotes, '+');
            }
        }

        // ========== CALCULATOR LOGIC ==========
        
        let currentInput = "0";
        let prevValue = "";
        let currentOp = null;
        let resetDisplay = false;

        const displayEl = document.getElementById("display");
        const realTimeEl = document.getElementById("realTime");

        // Real Time Clock
        function updateRealTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            const timeString = `${hours}:${minutes.toString().padStart(2, '0')} ${ampm}`;
            if (realTimeEl) realTimeEl.textContent = timeString;
        }
        updateRealTime();
        setInterval(updateRealTime, 1000);

        // Fullscreen for mobile
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) setTimeout(() => enterFullscreen(), 500);
        });

        // Modal
        const infoBtn = document.getElementById('infoBtn');
        const modal = document.getElementById('guidelineModal');
        const closeModal = document.getElementById('closeModal');
        
        if (infoBtn) infoBtn.onclick = () => modal.classList.add('show');
        if (closeModal) closeModal.onclick = () => modal.classList.remove('show');
        if (modal) modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };

        // Display functions
        function updateDisplay() {
            let val = currentInput;
            if (val.length > 30) val = val.slice(0, 30) + "...";
            displayEl.value = val;
        }

        function animateDisplay() {
            displayEl.classList.remove('display-pop');
            displayEl.offsetHeight;
            displayEl.classList.add('display-pop');
        }

        function appendNumber(num) {
            if (resetDisplay) {
                currentInput = "";
                resetDisplay = false;
            }
            if (num === "." && currentInput.includes(".")) return;
            if (currentInput === "0" && num !== ".") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = "0";
            prevValue = "";
            currentOp = null;
            resetDisplay = false;
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput === "0") return;
            if (currentInput.startsWith("-")) {
                currentInput = currentInput.slice(1);
            } else {
                currentInput = "-" + currentInput;
            }
            updateDisplay();
        }

        function setOperation(op) {
            if (currentInput === "") currentInput = "0";
            if (prevValue !== "" && currentOp !== null) {
                currentOp = op;
                resetDisplay = true;
                return;
            }
            prevValue = currentInput;
            currentOp = op;
            resetDisplay = true;
        }

        // 🔥 CORE FUNCTION: Show quote instead of answer!
        function showQuoteInsteadOfAnswer() {
            let quote;
            
            if (currentOp === null || prevValue === "") {
                quote = getQuoteByOperation('+');
            } else {
                quote = getQuoteByOperation(currentOp);
            }
            
            // Display the quote
            displayEl.value = quote;
            animateDisplay();
            
            // Reset for next calculation
            currentInput = "0";
            prevValue = "";
            currentOp = null;
            resetDisplay = true;
        }

        function handlePercent() {
            if (currentInput === "") currentInput = "0";
            const quote = getQuoteByOperation('%');
            displayEl.value = quote;
            animateDisplay();
            currentInput = "0";
            prevValue = "";
            currentOp = null;
            resetDisplay = true;
        }

        // Touch optimization
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchstart', () => { btn.style.transform = 'scale(0.94)'; });
            btn.addEventListener('touchend', () => { btn.style.transform = 'scale(1)'; });
        });

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (!isNaN(key) && key !== ' ') appendNumber(key);
            else if (key === '.') appendNumber('.');
            else if (key === '+' || key === '-' || key === '*' || key === '/') {
                e.preventDefault();
                if (key === '*') setOperation('×');
                else if (key === '/') setOperation('÷');
                else setOperation(key);
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                showQuoteInsteadOfAnswer();
            } else if (key === 'Escape' || key === 'c' || key === 'C') clearAll();
            else if (key === '%') {
                e.preventDefault();
                handlePercent();
            } else if (key === 'Backspace') {
                e.preventDefault();
                if (currentInput.length === 1 || currentInput === "0") currentInput = "0";
                else if (currentInput.length > 1) currentInput = currentInput.slice(0, -1);
                updateDisplay();
            }
        });

        // Button event listeners
        document.querySelectorAll('.num').forEach(btn => {
            btn.onclick = () => appendNumber(btn.getAttribute('data-num'));
        });
        
        document.querySelectorAll('.operator').forEach(btn => {
            btn.onclick = () => setOperation(btn.getAttribute('data-op'));
        });
        
        document.querySelector('[data-action="clear"]').onclick = clearAll;
        document.querySelector('[data-action="toggleSign"]').onclick = toggleSign;
        document.querySelector('[data-action="percent"]').onclick = handlePercent;
        document.querySelector('[data-action="equals"]').onclick = showQuoteInsteadOfAnswer;

        // Welcome message
        displayEl.value = "✨ Welcome! Type any equation and press = ✨";
    </script>
</body>
</html>
