<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VibeCalc · Quote Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="real-time" id="realTime">--:--</div>
            <button class="info-btn" id="infoBtn">ⓘ</button>
        </div>
        
        <div class="display-container">
            <div class="calc-display">
                <input type="text" id="display" readonly value="0" inputmode="none">
            </div>
        </div>
        
        <div class="buttons-grid">
            <button class="btn func" data-action="clear">AC</button>
            <button class="btn func" data-action="toggleSign">+/−</button>
            <button class="btn func" data-action="percent">%</button>
            <button class="btn operator" data-op="÷">÷</button>
            
            <button class="btn num" data-num="7">7</button>
            <button class="btn num" data-num="8">8</button>
            <button class="btn num" data-num="9">9</button>
            <button class="btn operator" data-op="×">✕</button>
            
            <button class="btn num" data-num="4">4</button>
            <button class="btn num" data-num="5">5</button>
            <button class="btn num" data-num="6">6</button>
            <button class="btn operator" data-op="-">−</button>
            
            <button class="btn num" data-num="1">1</button>
            <button class="btn num" data-num="2">2</button>
            <button class="btn num" data-num="3">3</button>
            <button class="btn operator" data-op="+">+</button>
            
            <button class="btn num zero" data-num="0">0</button>
            <button class="btn num" data-num=".">.</button>
            <button class="btn equal" data-action="equals">=</button>
        </div>
        
        <div class="home-indicator"></div>
    </div>
    
    <div class="modal" id="guidelineModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📖 How It Works</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="rule-item">
                    <span class="rule-op">+</span>
                    <span class="rule-desc">→ Motivational Quote</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">-</span>
                    <span class="rule-desc">→ Pick-up Line</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">÷</span>
                    <span class="rule-desc">→ Funny Joke</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">✕</span>
                    <span class="rule-desc">→ Fun Task</span>
                </div>
                <div class="rule-item">
                    <span class="rule-op">%</span>
                    <span class="rule-desc">→ Deep Question</span>
                </div>
                <div class="rule-separator"></div>
                <div class="rule-tip">
                    🎯 Type any equation (like 2+2) and press <strong>=</strong><br>
                    The display shows a QUOTE instead of the number!
                </div>
            </div>
        </div>
    </div>
    
    <script src="quotes.js"></script>
    <script src="script.js"></script>
</body>
</html>
